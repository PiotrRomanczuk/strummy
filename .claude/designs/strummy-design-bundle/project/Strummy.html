<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Strummy — Teacher Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Editorial light palette */
      --ivory: #f6f2ea;
      --paper: #fbf8f1;
      --card:  #ffffff;
      --ink:   #1a1613;
      --ink-2: #2a2420;
      --ink-3: #4a4037;
      --ink-4: #8a7e70;
      --ink-5: #c7bdaf;
      --rule:  #e6dccb;
      --rule-2:#efe7d6;

      --gold:     #c89523;
      --gold-2:   #b17f12;
      --gold-dim: #e9c874;
      --gold-tint:#fbf1d3;

      --success: #3a7d3a;
      --warn:    #c89523;
      --danger:  #b84a3a;
      --info:    #3a5a7d;

      --serif: 'Fraunces', 'Iowan Old Style', Georgia, serif;
      --sans:  'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --mono:  'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;

      --radius-sm: 6px;
      --radius:    10px;
      --radius-lg: 14px;

      --shadow-sm: 0 1px 2px rgba(26,22,19,.04), 0 1px 1px rgba(26,22,19,.03);
      --shadow-md: 0 4px 12px rgba(26,22,19,.06), 0 2px 4px rgba(26,22,19,.04);
    }

    /* Dark mode variables used by the top-level tweak */
    .theme-dark {
      --ivory: #15110e;
      --paper: #1a1612;
      --card:  #221c17;
      --ink:   #f5efe4;
      --ink-2: #e6decd;
      --ink-3: #b5a995;
      --ink-4: #7a6e5e;
      --ink-5: #40372d;
      --rule:  #2e2620;
      --rule-2:#362c24;

      --gold:     #e7b64a;
      --gold-2:   #f0c968;
      --gold-dim: #8a6a1e;
      --gold-tint:#3a2d14;

      --success: #7ac47a;
      --warn:    #e7b64a;
      --danger:  #e8806e;
      --info:    #8ab0d8;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--ivory);
      color: var(--ink);
      font-family: var(--sans);
      font-feature-settings: 'ss01', 'cv11';
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button { font-family: inherit; }

    /* thin scrollbars inside mock app viewports */
    .app-viewport *::-webkit-scrollbar { width: 8px; height: 8px; }
    .app-viewport *::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 8px; }
    .app-viewport *::-webkit-scrollbar-track { background: transparent; }

    /* Root tweak panel */
    .tweaks-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      box-shadow: 0 10px 40px rgba(26,22,19,.18);
      z-index: 10000;
      font-family: var(--sans);
      font-size: 13px;
      color: var(--ink);
      display: none;
      min-width: 220px;
    }
    .tweaks-panel.open { display: block; }
    .tweaks-panel h4 {
      margin: 0 0 10px 0;
      font-family: var(--serif);
      font-weight: 500;
      font-size: 15px;
      letter-spacing: -0.01em;
    }
    .tweak-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 6px 0; }
    .tweak-row label { color: var(--ink-3); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
    .segmented {
      display: inline-flex;
      background: var(--rule-2);
      border-radius: 999px;
      padding: 2px;
      gap: 2px;
    }
    .segmented button {
      border: none;
      background: transparent;
      color: var(--ink-3);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      font-family: var(--sans);
    }
    .segmented button.active {
      background: var(--card);
      color: var(--ink);
      box-shadow: var(--shadow-sm);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Tweaks panel -->
  <div id="tweaks" class="tweaks-panel">
    <h4>Tweaks</h4>
    <div class="tweak-row">
      <label>Theme</label>
      <div class="segmented" id="theme-seg">
        <button data-v="light" class="active">Light</button>
        <button data-v="dark">Dark</button>
      </div>
    </div>
    <div class="tweak-row">
      <label>Fretboard</label>
      <div class="segmented" id="fb-seg">
        <button data-v="studio">Studio</button>
        <button data-v="engraved" class="active">Engraved</button>
        <button data-v="mono">Mono</button>
      </div>
    </div>
  </div>

  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "fbStyle": "engraved"
    }/*EDITMODE-END*/;

    // Apply theme class
    function applyTheme(t) {
      document.documentElement.classList.toggle('theme-dark', t === 'dark');
      document.querySelectorAll('#theme-seg button').forEach(b => {
        b.classList.toggle('active', b.dataset.v === t);
      });
    }
    applyTheme(TWEAK_DEFAULTS.theme);

    // Tweak panel wiring
    window.addEventListener('message', (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('open');
      else if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    document.querySelectorAll('#theme-seg button').forEach(b => {
      b.addEventListener('click', () => {
        const v = b.dataset.v;
        applyTheme(v);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: v } }, '*');
      });
    });

    // Fretboard style wiring
    function applyFbStyle(v) {
      document.querySelectorAll('#fb-seg button').forEach(b => {
        b.classList.toggle('active', b.dataset.v === v);
      });
      window.dispatchEvent(new CustomEvent('fb-style-change', { detail: { fbStyle: v } }));
    }
    applyFbStyle(TWEAK_DEFAULTS.fbStyle);
    document.querySelectorAll('#fb-seg button').forEach(b => {
      b.addEventListener('click', () => {
        const v = b.dataset.v;
        applyFbStyle(v);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { fbStyle: v } }, '*');
      });
    });
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/fretboard-theory.jsx"></script>
  <script type="text/babel" src="src/fretboard-svg.jsx"></script>
  <script type="text/babel" src="src/fretboard-explorer.jsx"></script>
  <script type="text/babel" src="src/direction-a.jsx"></script>
  <script type="text/babel" src="src/direction-b.jsx"></script>
  <script type="text/babel" src="src/song-form-a.jsx"></script>
  <script type="text/babel" src="src/song-form-b.jsx"></script>
  <script type="text/babel" src="src/landing-primitives.jsx"></script>
  <script type="text/babel" src="src/landing-hero.jsx"></script>
  <script type="text/babel" src="src/landing-sections.jsx"></script>
  <script type="text/babel" src="src/landing-page.jsx"></script>
  <script type="text/babel" src="src/dashboard-shared.jsx"></script>
  <script type="text/babel" src="src/student-dashboard.jsx"></script>
  <script type="text/babel" src="src/teacher-dashboard.jsx"></script>
  <script type="text/babel" src="src/admin-dashboard.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
