<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strummy — The studio your students deserve</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --ivory: #f6f2ea;
        --paper: #fbf8f1;
        --card: #ffffff;
        --ink: #1a1613;
        --ink-2: #2a2420;
        --ink-3: #4a4037;
        --ink-4: #8a7e70;
        --ink-5: #c7bdaf;
        --rule: #e6dccb;
        --rule-2: #efe7d6;

        --gold: #c89523;
        --gold-2: #b17f12;
        --gold-dim: #e9c874;
        --gold-tint: #fbf1d3;

        --success: #3a7d3a;
        --warn: #c89523;
        --danger: #b84a3a;
        --info: #3a5a7d;

        --serif: 'Fraunces', 'Iowan Old Style', Georgia, serif;
        --sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;

        --radius-sm: 6px;
        --radius: 10px;
        --radius-lg: 14px;

        --shadow-sm: 0 1px 2px rgba(26, 22, 19, 0.04), 0 1px 1px rgba(26, 22, 19, 0.03);
        --shadow-md: 0 4px 12px rgba(26, 22, 19, 0.06), 0 2px 4px rgba(26, 22, 19, 0.04);
      }
      .theme-dark {
        --ivory: #15110e;
        --paper: #1a1612;
        --card: #221c17;
        --ink: #f5efe4;
        --ink-2: #e6decd;
        --ink-3: #b5a995;
        --ink-4: #7a6e5e;
        --ink-5: #40372d;
        --rule: #2e2620;
        --rule-2: #362c24;
        --gold: #e7b64a;
        --gold-2: #f0c968;
        --gold-dim: #8a6a1e;
        --gold-tint: #3a2d14;
        --success: #7ac47a;
        --warn: #e7b64a;
        --danger: #e8806e;
        --info: #8ab0d8;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--ivory);
        color: var(--ink);
        font-family: var(--sans);
        font-feature-settings: 'ss01', 'cv11';
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      button {
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // Apply theme via URL or default light
      const params = new URLSearchParams(location.search);
      if (params.get('theme') === 'dark') document.documentElement.classList.add('theme-dark');
    </script>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="src/data.jsx"></script>
    <script type="text/babel" src="src/primitives.jsx"></script>
    <script type="text/babel" src="src/landing-primitives.jsx"></script>
    <script type="text/babel" src="src/landing-hero.jsx"></script>
    <script type="text/babel" src="src/landing-sections.jsx"></script>
    <script type="text/babel" src="src/landing-page.jsx"></script>
    <script type="text/babel">
      ReactDOM.createRoot(document.getElementById('root')).render(<LandingPageDesktop />);
    </script>
  </body>
</html>
