# Scheduled cron jobs via GitHub Actions
#
# Vercel Hobby plan limits cron to 1 daily invocation.
# This workflow fills the gap for jobs that need higher frequency.
#
# Sub-daily crons (notification queue, admin monitoring) live here.
# Daily crons remain in vercel.json.
#
# Required GitHub Actions secrets:
#   CRON_SECRET       - same value as the Vercel env var
#   PRODUCTION_URL    - production app URL (e.g. https://strummy.app)

name: Scheduled Cron Jobs

on:
  schedule:
    # Every 6 hours — notification queue + auth cleanup
    # (was every 15min — caused ~2,880 runs/month, $100+ in Actions minutes)
    - cron: "0 */6 * * *"
    # Once daily at 08:00 UTC — admin monitoring
    - cron: "0 8 * * *"

  # Allow manual trigger for debugging
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        type: choice
        options:
          - all
          - notification-queue
          - admin-monitoring

jobs:
  check-secrets:
    name: Verify Secrets
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ] || [ -z "${{ secrets.PRODUCTION_URL }}" ]; then
            echo "has-secrets=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping cron jobs — CRON_SECRET and/or PRODUCTION_URL secrets are not configured"
          else
            echo "has-secrets=true" >> "$GITHUB_OUTPUT"
          fi

  notification-queue:
    name: Process Notification Queue
    runs-on: ubuntu-latest
    needs: check-secrets
    if: >-
      needs.check-secrets.outputs.has-secrets == 'true' && (
        github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'all' || github.event.inputs.job == 'notification-queue')
        || github.event_name == 'schedule'
      )
    steps:
      - name: Call notification queue endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PRODUCTION_URL }}/api/cron/process-notification-queue")
          echo "HTTP status: $response"
          if [ "$response" -ge 500 ]; then
            echo "::error::Notification queue cron failed with HTTP $response"
            exit 1
          fi

  admin-monitoring:
    name: Admin Monitoring
    runs-on: ubuntu-latest
    needs: check-secrets
    # Run once daily at 08:00 UTC or manual trigger
    if: >-
      needs.check-secrets.outputs.has-secrets == 'true' && (
        github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'all' || github.event.inputs.job == 'admin-monitoring')
        || github.event.schedule == '0 8 * * *'
      )
    steps:
      - name: Call admin monitoring endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PRODUCTION_URL }}/api/cron/admin-monitoring")
          echo "HTTP status: $response"
          if [ "$response" -ge 500 ]; then
            echo "::error::Admin monitoring cron failed with HTTP $response"
            exit 1
          fi
