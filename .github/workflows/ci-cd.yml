name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR — saves minutes on rapid pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'mock-key' }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'mock-key' }}
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

jobs:
  # Gate: Skip CI for automated version-bump commits
  should-run:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" == chore:\ bump\ version* ]]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  # Job 1: Linting and Type Checking
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [should-run]
    if: needs.should-run.outputs.should_run == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: |
          # Run tsc and filter known pre-existing errors:
          # - notification-service.ts: missing Supabase generated types
          # - TS2307/TS2875/TS7026: React/Next.js type resolution issues in CI
          # - migrate-remote.ts: legacy script with any types
          TSC_OUTPUT=$(npx tsc --noEmit 2>&1) || true
          FILTERED=$(echo "$TSC_OUTPUT" | grep "error TS" \
            | grep -v "lib/services/notification-service.ts" \
            | grep -v "error TS2307" \
            | grep -v "error TS2875" \
            | grep -v "error TS7026" \
            | grep -v "migrate-remote.ts" \
            || true)

          if [ -n "$FILTERED" ]; then
            echo "TypeScript errors found:"
            echo "$FILTERED"
            exit 1
          else
            echo "TypeScript check passed (known pre-existing errors filtered)"
          fi

  # Job 2: Unit and Integration Tests
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: [should-run]
    if: needs.should-run.outputs.should_run == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci -- --coverage --testPathIgnorePatterns='integration.test.ts' --testPathIgnorePatterns='database/'
        env:
          CI: true
          SKIP_DB_TESTS: true

      - name: Run Integration Tests
        run: npx jest --config jest.config.integration.ts --passWithNoTests

      - name: Check coverage thresholds (non-blocking)
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "⚠️ Coverage summary not found (non-blocking)"
            # exit 1  # Disabled - not failing CI
          else
            STATEMENTS=$(jq '.total.statements.pct' coverage/coverage-summary.json)
            BRANCHES=$(jq '.total.branches.pct' coverage/coverage-summary.json)
            FUNCTIONS=$(jq '.total.functions.pct' coverage/coverage-summary.json)
            LINES=$(jq '.total.lines.pct' coverage/coverage-summary.json)
            
            echo "Coverage: Statements=$STATEMENTS%, Branches=$BRANCHES%, Functions=$FUNCTIONS%, Lines=$LINES%"
            
            # Threshold set to 15% temporarily as current coverage is around 18%
            if (( $(echo "$STATEMENTS < 15" | bc -l) )) || 
               (( $(echo "$BRANCHES < 15" | bc -l) )) || 
               (( $(echo "$FUNCTIONS < 15" | bc -l) )) || 
               (( $(echo "$LINES < 15" | bc -l) )); then
              echo "❌ Coverage below 15% threshold"
              exit 1
            else
              echo "✅ Coverage meets thresholds"
            fi
          fi

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

  # Job 3: Build Application
  build:
    name: Build Next.js Application
    runs-on: ubuntu-latest
    needs: [should-run, lint-and-typecheck, unit-tests]
    if: needs.should-run.outputs.should_run == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'mock-key' }}

      - name: Check build output
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi
          echo "✅ Build successful"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nextjs-build
          path: |
            .next
            public
          retention-days: 1

  # Job 4: Check Secrets
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        env:
          HAS_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID != '' }}
        run: |
          if [ "$HAS_PROJECT_ID" = "true" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          fi

  # Job 5: Database Quality & Schema Validation
  database-quality:
    name: Database Quality & Schema Validation
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, check-secrets]
    if: needs.check-secrets.outputs.has-secrets == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Remote Supabase
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check Database Schema Integrity
        run: |
          echo "🔍 Validating database schema against migrations..."
          # This validates that the remote database schema matches the migrations
          # without modifying the database
          supabase db diff --linked --use-migra || {
            echo "⚠️  Database schema differs from migrations"
            echo "📝 Consider running migrations manually: supabase db push"
            echo "❌ This is informational only - not failing the build"
          }
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run Database Quality Checks
        env:
          PGHOST: db.${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGDATABASE: postgres
        run: |
          chmod +x scripts/database/maintenance/check-db-quality.sh
          ./scripts/database/maintenance/check-db-quality.sh

  # E2E tests are EXPENSIVE (Playwright + chromium). Only run on production pushes.
  # For PRs, rely on unit/integration tests + manual E2E before merge.
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run E2E Tests
        run: npx playwright test --project="Desktop Chrome"
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Job 6: Security Audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [should-run]
    if: needs.should-run.outputs.should_run == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Run npm audit
        run: npm audit --audit-level=critical || echo "::warning::npm audit found vulnerabilities — review output above"

      - name: Check for hardcoded secrets
        run: |
          echo "🔒 Checking for hardcoded secrets..."

          VIOLATIONS=0

          # Check for hardcoded secrets in source files (excluding test fixtures)
          if grep -r -E "(password|secret|api_key|private_key)\s*=\s*['\"][^'\"]{20,}['\"]" \
             --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
             --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=coverage \
             --exclude-dir=__tests__ --exclude="*.test.*" --exclude="*.cy.*" . 2>/dev/null || true; then
            echo "⚠️  Found potential hardcoded secrets (review manually)"
            # Don't fail for now, just warn
          fi

          echo "✅ Security check complete"

  # Job 7: Lighthouse CI (Disabled)
  # lighthouse:
  #   name: Lighthouse CI
  #   runs-on: ubuntu-latest
  #   needs: [build]
  #
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v6
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v6
  #       with:
  #         node-version: ${{ env.NODE_VERSION }}
  #         cache: 'npm'
  #
  #     - name: Install dependencies
  #       run: npm ci
  #
  #     - name: Install Lighthouse
  #       run: npm install -g lighthouse
  #
  #     - name: Run Lighthouse CI
  #       run: |
  #         # Start server in background
  #         npm run dev &
  #         PID=$!
  #
  #         # Run lighthouse script
  #         chmod +x scripts/ci/lighthouse-ci.sh
  #         ./scripts/ci/lighthouse-ci.sh http://localhost:3000
  #
  #         # Kill server
  #         kill $PID
  #       env:
  #         NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
  #         NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'mock-key' }}

  # Job 8: Quality Gate Summary
  quality-gate:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, build, database-quality, security-audit]
    if: always()

    steps:
      - name: Check all required jobs
        run: |
          echo "Quality Gate Results:"
          echo "====================="

          if [[ "${{ needs.lint-and-typecheck.result }}" == "skipped" ]]; then
            echo "⏭️  Lint & Type Check: SKIPPED (version bump)"
          elif [[ "${{ needs.lint-and-typecheck.result }}" != "success" ]]; then
            echo "❌ Lint & Type Check: FAILED"
            exit 1
          else
            echo "✅ Lint & Type Check: PASSED"
          fi

          if [[ "${{ needs.unit-tests.result }}" == "skipped" ]]; then
            echo "⏭️  Unit Tests: SKIPPED (version bump)"
          elif [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "❌ Unit Tests: FAILED"
            exit 1
          else
            echo "✅ Unit Tests: PASSED"
          fi

          if [[ "${{ needs.build.result }}" == "skipped" ]]; then
            echo "⏭️  Build: SKIPPED (version bump)"
          elif [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build: FAILED"
            exit 1
          else
            echo "✅ Build: PASSED"
          fi

          if [[ "${{ needs.database-quality.result }}" == "skipped" ]]; then
            echo "⚠️  Database Quality: SKIPPED (Missing Secrets)"
          elif [[ "${{ needs.database-quality.result }}" != "success" ]]; then
            echo "❌ Database Quality: FAILED"
            exit 1
          else
            echo "✅ Database Quality: PASSED"
          fi

          if [[ "${{ needs.security-audit.result }}" == "skipped" ]]; then
            echo "⏭️  Security Audit: SKIPPED (version bump)"
          elif [[ "${{ needs.security-audit.result }}" != "success" ]]; then
            echo "❌ Security Audit: FAILED"
            exit 1
          else
            echo "✅ Security Audit: PASSED"
          fi

          # if [[ "${{ needs.lighthouse.result }}" != "success" ]]; then
          #   echo "❌ Lighthouse CI: FAILED"
          #   exit 1
          # else
          #   echo "✅ Lighthouse CI: PASSED"
          # fi

          echo "====================="
          echo "✅ All quality gates passed!"

  # Job 9: Deploy Database Changes
  deploy-database:
    name: Deploy Database Changes
    runs-on: ubuntu-latest
    needs: [quality-gate, check-secrets]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') && github.event_name == 'push' && needs.check-secrets.outputs.has-secrets == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Remote Supabase
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Migrations
        run: supabase db push --dry-run && supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

  # Deploy Preview (for PRs only — production deploys are manual via deploy.yml)
  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN_GITHUB_ACTIONS }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN_GITHUB_ACTIONS }}

      - name: Deploy Preview to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN_GITHUB_ACTIONS }})
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed preview to: $DEPLOYMENT_URL"

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 Preview deployment ready: ${{ steps.deploy.outputs.url }}'
            })
